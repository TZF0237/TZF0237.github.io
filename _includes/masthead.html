{% include base_path %}
<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <button><span class="navicon"></span></button>
        <ul class="visible-links">
          <li class="masthead__menu-item masthead__menu-item--lg persist {% if page.url == '/' or page.url == '/index.html' %}selected{% endif %}">
            <a href="{{ base_path }}/">{{ site.title }}</a>
          </li>
          {% for link in site.data.navigation.main %}
            {% if link.url contains 'http' %}
              {% assign domain = '' %}
            {% else %}
              {% assign domain = base_path %}
            {% endif %}
            <li class="masthead__menu-item {% if page.url contains link.url and link.url != '/' %}selected{% endif %}">
              <a href="{{ domain }}{{ link.url }}">{{ link.title }}</a>
            </li>
          {% endfor %}
          <li class="masthead__menu-item persist tail search-toggle">
            <a role="button" aria-label="Search" id="search-toggle-btn" title="Search">
              <i class="fas fa-search" aria-hidden="true"></i>
            </a>
          </li>
          <li id="theme-toggle" class="masthead__menu-item persist tail">
            <a role="button" aria-labelledby="theme-icon"><i id="theme-icon" class="fa-solid fa-sun" aria-hidden="true" title="toggle theme"></i></a>
          </li>
        </ul>
        <ul class="hidden-links hidden"></ul>
      </nav>
    </div>
  </div>
  <!-- Search overlay -->
  <div id="search-overlay" class="search-overlay">
    <div class="search-overlay__inner">
      <div class="search-overlay__header">
        <input type="text" id="search-input" class="search-input" placeholder="Search..." autocomplete="off" autocapitalize="off" spellcheck="false">
        <button id="search-close-btn" class="search-close-btn" aria-label="Close search">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div id="search-results" class="search-results">
        <p class="search-hint">Type to search posts and pages...</p>
      </div>
    </div>
  </div>
</div>
